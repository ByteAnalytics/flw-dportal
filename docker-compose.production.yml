version: "3.8"

services:
  infracredit-frontend:
    container_name: infracredit-frontend
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time arguments (CRITICAL: NEXT_PUBLIC_* vars must be here!)
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NODE_ENV=production
    ports:
      - "8010:8010"
    environment:
      # Runtime environment variables
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    networks:
      - infracredit-network
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://66.42.92.219:8010', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Add Nginx reverse proxy
  # nginx:
  #   image: nginx:alpine
  #   container_name: infracredit-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - infracredit-frontend
  #   restart: unless-stopped
  #   networks:
  #     - infracredit-network

networks:
  infracredit-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16
