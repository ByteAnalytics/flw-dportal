version: "3.8"

services:
  infracredit-frontend:
    image: ${DOCKER_IMAGE:-chenray79/infracredit_fe:latest}
    container_name: ${CONTAINER_NAME:-infracredit-frontend}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time arguments (CRITICAL: NEXT_PUBLIC_* vars must be here!)
        - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
        - NODE_ENV=production
    ports:
      - "${HOST_PORT:-3010}:${CONTAINER_PORT:-3000}"
    environment:
      # Runtime environment variables
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:${CONTAINER_PORT:-3000}', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "1"
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
